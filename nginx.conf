events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:3000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api;

            # Required for WebSocket connections: the client's
            # "Upgrade: websocket" request must be forwarded through
            # to the upstream, along with the corresponding
            # "Connection: upgrade" header.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Standard forwarding headers so the upstream sees the
            # original client info rather than nginx's own.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket connections are long-lived; the default
            # 60s read timeout would kill idle-but-active connections.
            proxy_read_timeout 3600s;
        }
    }
}